# GitLab CI - Secure DevSecOps Pipeline (Reference)
#
# NOTE: The actual running pipeline for this assessment is GitHub Actions:
#   rajutest-devops/terragoat -> .github/workflows/devsecops-pipeline.yml
#
# This file is the GitLab CI equivalent required by the assessment document.
# Same three stages, same tools - GitLab CI syntax instead of GitHub Actions.
#
# Key fix vs the original gitlabci/bla.yml (SC-001):
#   Original: Sends the CI job token externally via curl to webhook.site
#   Fixed:    Token never leaves the runner. OIDC used internally only.

stages:
  - lint
  - iac-scan
  - secret-scan

variables:
  TF_VERSION: "1.5.7"
  CHECKOV_VERSION: "3.2.0"

# Stage 1: Lint
# Validates HCL syntax before any scanning. Fails fast on invalid code.

terraform-fmt:
  stage: lint
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - terraform fmt -check -recursive terraform/
  allow_failure: true

terraform-validate:
  stage: lint
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - cd terraform/aws   && terraform init -backend=false && terraform validate
    - cd ../../terraform/azure && terraform init -backend=false && terraform validate
    - cd ../../terraform/gcp   && terraform init -backend=false && terraform validate
  allow_failure: false

# Stage 2: IaC Scan
# Checkov and TFSec run in parallel. Results go to GitLab Security Dashboard.

checkov-scan:
  stage: iac-scan
  image: bridgecrew/checkov:${CHECKOV_VERSION}
  script:
    - checkov -d terraform/aws   --output json --output-file checkov-aws.json   || true
    - checkov -d terraform/azure --output json --output-file checkov-azure.json || true
    - checkov -d terraform/gcp   --output json --output-file checkov-gcp.json   || true
    - checkov -d terraform/ --output cli
  artifacts:
    reports:
      sast: [checkov-aws.json, checkov-azure.json, checkov-gcp.json]
    paths: [checkov-*.json]
    expire_in: 30 days
  allow_failure: true

tfsec-scan:
  stage: iac-scan
  image: aquasec/tfsec:v1.28.4
  script:
    - tfsec terraform/aws   --format json > tfsec-aws.json   || true
    - tfsec terraform/azure --format json > tfsec-azure.json || true
    - tfsec terraform/gcp   --format json > tfsec-gcp.json   || true
    - tfsec terraform/ --format default
  artifacts:
    paths: [tfsec-*.json]
    expire_in: 30 days
  allow_failure: true

# Stage 3: Secret Scan
# Scans current files and full git history for hardcoded credentials.
# allow_failure: false - secrets must block the pipeline.

gitleaks-scan:
  stage: secret-scan
  image: zricethezav/gitleaks:v8.18.2
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-current.json || LEAK=$?
    - gitleaks detect --source . --log-opts="--all" --report-format json --report-path gitleaks-history.json || true
    - if [ "${LEAK}" != "" ]; then echo "SECRETS FOUND - review gitleaks-current.json"; exit 1; fi
  artifacts:
    paths: [gitleaks-current.json, gitleaks-history.json]
    expire_in: 30 days
    when: always
  allow_failure: false

# No deploy stage (intentional)
# This pipeline scans only. No Terraform apply, no cloud credentials stored.
# If a deploy stage is added, use OIDC id_tokens - not hardcoded keys.
# The CI job token must only be used within the runner for credential exchange,
# never sent to an external endpoint (which is what the original bla.yml did).
